<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aero-Rescue AI | Tactical Display</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="dashboard-container">
        <div class="control-panel">
            <div class="header">
                <h1>AEROTRACER</h1>
                <p>AIRCRAFT CRASH PREDICTION</p>
            </div>

            <form id="prediction-form">
                <div class="input-group">
                    <label>LAST LATITUDE</label>
                    <input type="number" id="last_lat" step="any" value="28.5355" required>
                </div>
                <div class="input-group">
                    <label>LAST LONGITUDE</label>
                    <input type="number" id="last_lon" step="any" value="77.3910" required>
                </div>
                <div class="input-group">
                    <label>ALTITUDE (FT)</label>
                    <input type="number" id="alt" value="30000" required>
                </div>
                <div class="input-group">
                    <label>SPEED (KNOTS)</label>
                    <input type="number" id="spd" value="450" required>
                </div>
                <div class="input-group">
                    <label>HEADING (DEG)</label>
                    <input type="number" id="hdg" value="180" required>
                </div>
                <div class="input-group">
                    <label>VERTICAL SPEED (FPM)</label>
                    <input type="number" id="vspd" value="-4000" required>
                </div>

                <button type="submit" class="cyber-btn">INITIALIZE SCAN</button>
            </form>

            <div id="status-box" class="status-box">SYSTEM STANDBY...</div>
        </div>

        <div class="map-container">
            <div class="hud-overlay">LIVE SAT-FEED</div>
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
